services:
  # Auth service database (users, oauth_accounts, refresh_tokens)
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: algo
      POSTGRES_PASSWORD: algo
      POSTGRES_DB: algo_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      # Use 'postgres' DB so health passes even when reusing volume that had different POSTGRES_DB
      test: ["CMD-SHELL", "pg_isready -U algo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Resume service database (resume_documents, system_prompts, llm_usage_logs, etc.)
  postgres-resume:
    image: postgres:18
    environment:
      POSTGRES_USER: algo
      POSTGRES_PASSWORD: algo
      POSTGRES_DB: algo_resume
    ports:
      - "5433:5432"
    volumes:
      - postgres_resume_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ensure algo_auth DB exists (e.g. when reusing volume that had algo_dev)
  postgres-auth-init:
    image: postgres:18
    environment:
      PGPASSWORD: algo
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - "psql -h postgres -U algo -d postgres -c 'CREATE DATABASE algo_auth' || true"

  # Ensure algo_resume DB exists (e.g. when reusing volume that had algo_dev)
  postgres-resume-init:
    image: postgres:18
    environment:
      PGPASSWORD: algo
    depends_on:
      postgres-resume:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - "psql -h postgres-resume -U algo -d postgres -c 'CREATE DATABASE algo_resume' || true"

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: algo
      MINIO_ROOT_PASSWORD: algodev8
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 algo algodev8 2>/dev/null; do echo 'Waiting for MinIO...'; sleep 2; done;
      mc mb myminio/resume-exports --ignore-existing;
      echo 'Bucket resume-exports ready';
      exit 0;
      "
    restart: "no"

  resume-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        SERVICE_NAME: resume-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: development
      DATABASE_URL: "postgresql://algo:algo@postgres-resume:5432/algo_resume"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: algo
      MINIO_SECRET_KEY: algodev8
      MINIO_BUCKET: resume-exports
      MINIO_FORCE_PATH_STYLE: "true"
      EXPORT_WORKER_ENABLED: "true"
      # Use system Chromium for PDF export (installed in image when SERVICE_NAME=resume-service)
      PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"
    volumes:
      # Whole service folder from volume (src, config, etc.)
      - ./services/resume-service:/app/services/resume-service
      - ./packages/cv-core:/app/packages/cv-core
      - ./packages/cv-layout:/app/packages/cv-layout
    depends_on:
      postgres-resume:
        condition: service_healthy
      postgres-resume-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - "pnpm --filter @algo/resume-service exec drizzle-kit push --force && exec pnpm exec turbo run dev --filter=@algo/resume-service..."

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        SERVICE_NAME: auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      AUTH_SERVICE_PORT: "3001"
      PORT: "3001"
      NODE_ENV: development
      DATABASE_URL: "postgresql://algo:algo@postgres:5432/algo_auth"
    volumes:
      - ./services/auth-service:/app/services/auth-service
    depends_on:
      postgres:
        condition: service_healthy
      postgres-auth-init:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - "pnpm --filter @algo/auth-service exec drizzle-kit push --force && exec pnpm exec turbo run dev --filter=@algo/auth-service..."

  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile.kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/tmp/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_PLUGINS: "bundled"
    env_file:
      - .env
    ports:
      - "8000:8000"   # proxy
      - "8001:8001"   # admin API (optional)
    volumes:
      - ./kong:/kong:ro
    command:
      - sh
      - -c
      - "export JWT_SECRET=$${JWT_SECRET:-dev-secret-change-me} && envsubst '$$JWT_SECRET' < /kong/kong.yml.template > /tmp/kong.yml && exec /docker-entrypoint.sh kong start"

volumes:
  postgres_data:
  postgres_resume_data:
  minio_data:
