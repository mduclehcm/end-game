services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: algo
      POSTGRES_PASSWORD: algo
      POSTGRES_DB: algo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algo -d algo_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  resume-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        SERVICE_NAME: resume-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: development
      DATABASE_URL: "postgresql://algo:algo@postgres:5432/algo_dev"
    volumes:
      # Whole service folder from volume (src, config, etc.)
      - ./services/resume-service:/app/services/resume-service
      - ./packages/cv-core:/app/packages/cv-core
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        SERVICE_NAME: auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      AUTH_SERVICE_PORT: "3001"
      PORT: "3001"
      NODE_ENV: development
      DATABASE_URL: "postgresql://algo:algo@postgres:5432/algo_dev"
    volumes:
      - ./services/auth-service:/app/services/auth-service
    depends_on:
      postgres:
        condition: service_healthy

  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile.kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/tmp/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_PLUGINS: "bundled"
    env_file:
      - .env
    ports:
      - "8000:8000"   # proxy
      - "8001:8001"   # admin API (optional)
    volumes:
      - ./kong:/kong:ro
    command:
      - sh
      - -c
      - "export JWT_SECRET=$${JWT_SECRET:-dev-secret-change-me} && envsubst '$$JWT_SECRET' < /kong/kong.yml.template > /tmp/kong.yml && exec /docker-entrypoint.sh kong start"

volumes:
  postgres_data:
